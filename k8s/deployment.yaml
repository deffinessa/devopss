apiVersion: apps/v1
kind: Deployment
metadata:
  name: maxint
  labels:
    app: maxint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maxint
  template:
    metadata:
      labels:
        app: maxint
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: maxint
          image: deffinessa/maxint:latest
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
