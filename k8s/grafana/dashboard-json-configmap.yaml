apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  maxint-dashboard.json: |
    {
      "title": "maxint Dashboard",
      "uid": "maxint-v1",
      "schemaVersion": 38,
      "version": 1,
      "style": "dark",
      "tags": ["maxint", "devops"],
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "editable": true,
      "graphTooltip": 0,
      "links": [],
      "annotations": { "list": [] },
      "templating": { "list": [] },
      "panels": [
        {
          "id": 1,
          "title": "HTTP Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus-ds" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true, "calcs": ["mean", "max"] },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus-ds" },
              "expr": "rate(maxint_requests_total[1m])",
              "legendFormat": "req/s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Computation Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus-ds" },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true, "calcs": ["mean", "max"] },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus-ds" },
              "expr": "rate(maxint_computations_total[1m])",
              "legendFormat": "comp/s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Last Max Value",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus-ds" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "min": -100,
              "max": 100,
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 0 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus-ds" },
              "expr": "maxint_last_max_value",
              "legendFormat": "max value",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Service Status",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus-ds" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "color": "red",   "index": 1, "text": "DOWN" },
                    "1": { "color": "green", "index": 0, "text": "UP"   }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",   "value": null },
                  { "color": "green", "value": 1    }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus-ds" },
              "expr": "maxint_up",
              "legendFormat": "status",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Max Value Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus-ds" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "min": -100,
              "max": 100,
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true, "calcs": ["mean", "max", "min"] },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus-ds" },
              "expr": "maxint_last_max_value",
              "legendFormat": "max value",
              "refId": "A"
            }
          ]
        }
      ]
    }
