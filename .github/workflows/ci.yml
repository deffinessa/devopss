name: ci

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Make scripts executable
        run: chmod +x scripts/*.sh
      - name: Build
        run: ./scripts/build.sh
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: maxint-binary
          path: maxint

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential curl
      - name: Make scripts executable
        run: chmod +x scripts/*.sh
      - name: Test
        run: ./scripts/test.sh

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential debhelper dpkg-dev
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: maxint-binary
      - name: Make scripts executable
        run: chmod +x scripts/*.sh
      - name: Build package
        run: ./scripts/package.sh
      - name: Upload deb package
        uses: actions/upload-artifact@v4
        with:
          name: maxint-deb
          path: maxint.deb

  deploy:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t maxint:ci .
      - name: Test Docker container
        run: |
          docker run -d --name maxint-test -p 8080:8080 maxint:ci
          sleep 3
          curl -f http://localhost:8080/healthz
          curl -f http://localhost:8080/compute
          curl -f http://localhost:8080/metrics | grep maxint_up
          docker stop maxint-test
          docker rm maxint-test
      - name: Publish to Docker Hub (on tags)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
          docker tag maxint:ci $DOCKER_USERNAME/maxint:${GITHUB_REF_NAME}
          docker tag maxint:ci $DOCKER_USERNAME/maxint:latest
          docker push $DOCKER_USERNAME/maxint:${GITHUB_REF_NAME}
          docker push $DOCKER_USERNAME/maxint:latest

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download deb package
        uses: actions/download-artifact@v4
        with:
          name: maxint-deb
      - name: Create Release and upload deb
        uses: softprops/action-gh-release@v2
        with:
          files: maxint.deb
