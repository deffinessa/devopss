name: ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper dpkg-dev

      - name: Make scripts executable
        run: chmod +x scripts/*.sh debian/rules

      - name: Build
        run: ./scripts/build.sh

  package:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper dpkg-dev

      - name: Make scripts executable
        run: chmod +x scripts/*.sh debian/rules

      - name: Package
        run: ./scripts/package.sh

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: maxint-deb
          path: ../*.deb

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper dpkg-dev

      - name: Make scripts executable
        run: chmod +x scripts/*.sh debian/rules

      - name: Build package
        run: ./scripts/package.sh

      - name: Create release and upload deb
        uses: softprops/action-gh-release@v2
        with:
          files: ../*.deb
